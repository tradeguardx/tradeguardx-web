    <meta property="og:locale" content="en_US" />

              "url": "https://tradeguardx.com/favicon.svg"
            },
            "sameAs": []

          {
            "@type": "WebSite",
            "@id": "https://tradeguardx.com/#website",
            "url": "https://tradeguardx.com",
            "name": "TradeGuardX",
            "publisher": { "@id": "https://tradeguardx.com/#organization" }
          },
          {
            "@type": "SoftwareApplication",
